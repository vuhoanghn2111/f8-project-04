        <!-- Hero -->
        <section class="hero">
            <div class="container">
                <!-- Media -->
                <article class="hero__media">
                    <div class="hero__cat--img hero__image">
                        <img
                            src="./assets/image/hero/red-white-cat-i-white-studio-removebg.png"
                            alt="cat"
                            class="hero__img"
                        />
                        <!-- Deco -->
                        <img
                            src="./assets/image/hero/deco1.svg"
                            alt="deco1"
                            class="hero__deco deco__right"
                        />
                        <img
                            src="./assets/image/hero/deco2.svg"
                            alt="deco1"
                            class="hero__deco deco__left"
                        />
                    </div>
                    <div class="hero__dog--img hero__image">
                        <img
                            src="./assets/image/hero/edson-torres-hjzs2nA4y-k-unsplash-removebg.png"
                            alt="dog"
                            class="hero__img"
                        />
                    </div>
                </article>
                <section class="hero__content">
                    <h1 class="hero__heading">
                        Established & Trusted Pet Care Service
                    </h1>
                    <p class="hero__desc">
                        Discover a wide variety of Pawsitive services to choose
                        from, including daycare, private walks, office duty and
                        spa.
                    </p>
                    <div class="hero__action">
                        <button class="btn hero__btn">
                            <span>Book a Meet</span>
                            <div class="hero__right">
                                <svg
                                    xmlns="http://www.w3.org/2000/svg"
                                    width="4"
                                    height="6"
                                    viewBox="0 0 4 6"
                                    fill="none"
                                >
                                    <path
                                        class="hero__right--color"
                                        d="M0.5 0.5L3 3L0.5 5.5"
                                        stroke="#FD5056"
                                        stroke-linecap="round"
                                        stroke-linejoin="round"
                                    />
                                </svg>
                            </div>
                        </button>
                        <a href="#!" class="hero__call">Schedule a Call</a>
                    </div>
                </section>
